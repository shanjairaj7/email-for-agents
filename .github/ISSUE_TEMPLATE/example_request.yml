name: Example Request
description: Request a new platform integration or use-case example
labels: ["enhancement", "example-request"]
body:
  - type: markdown
    attributes:
      value: |
        Have a use case or framework not covered yet? We'd love to add it.

  - type: dropdown
    id: type
    attributes:
      label: What kind of example?
      options:
        - New platform (e.g. AutoGen, Pydantic AI, Haystack)
        - New use case (e.g. legal document review, HR onboarding)
        - New capability (e.g. attachment handling, scheduled sends)
        - Improvement to existing example
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform / Framework
      placeholder: "e.g. AutoGen, Pydantic AI, n8n"

  - type: textarea
    id: use-case
    attributes:
      label: Use case description
      description: What should the agent do? What problem does it solve?
      placeholder: |
        An AutoGen multi-agent pipeline where a UserProxy agent sends emails
        and an AssistantAgent processes replies — useful for automated research workflows.
    validations:
      required: true

  - type: checkboxes
    id: willing-to-contribute
    attributes:
      label: Willing to contribute?
      options:
        - label: I'd like to submit a PR for this example
