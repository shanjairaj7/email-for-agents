version: 2

updates:
  # Python packages — check monthly
  - package-ecosystem: "pip"
    directory: "/langchain/customer-support"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/langchain/lead-outreach"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/langchain/email-sms-tools"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/crewai/support-crew"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/crewai/outreach-crew"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/openai-agents/support-agent"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/claude/support-agent"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/claude/extraction-agent"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/sms/alert-agent"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  # npm packages — check monthly
  - package-ecosystem: "npm"
    directory: "/typescript/webhook-handler"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/typescript/multi-agent"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/mcp-server"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/openclaw-email-sms/skills/commune-email"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5

  # GitHub Actions — keep runners up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
